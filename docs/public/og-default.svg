<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark terminal background, matching site's dark theme -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Top group-color band: Build / Verify / Communicate / Operate -->
  <rect x="0"   y="0" width="300" height="10" fill="#5eead4"/>
  <rect x="300" y="0" width="300" height="10" fill="#fbbf24"/>
  <rect x="600" y="0" width="300" height="10" fill="#f0abfc"/>
  <rect x="900" y="0" width="300" height="10" fill="#fb923c"/>

  <!-- Wordmark -->
  <text
    x="80" y="290"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="86" font-weight="700"
    fill="#ffffff"
    letter-spacing="-2">SoulInTheMachine</text>

  <!-- Primary tagline (project thesis) -->
  <text
    x="80" y="370"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
    font-size="38" font-weight="500"
    fill="#5eead4">Predictable unpredictability for AI agents.</text>

  <!-- Secondary description -->
  <text
    x="80" y="440"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
    font-size="26" font-weight="400"
    fill="#9ca3af">A registry of agent personality profiles —</text>
  <text
    x="80" y="478"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
    font-size="26" font-weight="400"
    fill="#9ca3af">15 archetypes scored on a 10-axis functional radar.</text>

  <!-- Decorative radar polygon on the right side -->
  <g transform="translate(960, 320)" stroke-linejoin="round">
    <!-- reference rings -->
    <circle cx="0" cy="0" r="32"  fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="0" cy="0" r="64"  fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="0" cy="0" r="96"  fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="0" cy="0" r="128" fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#1f2937" stroke-width="1"/>

    <!-- 10 axis spokes, group-colored -->
    <g stroke-width="1" opacity="0.55">
      <line x1="0" y1="0" x2="0"        y2="-160" stroke="#5eead4"/>
      <line x1="0" y1="0" x2="93.97"    y2="-129.44" stroke="#5eead4"/>
      <line x1="0" y1="0" x2="152.17"   y2="-49.44" stroke="#fbbf24"/>
      <line x1="0" y1="0" x2="152.17"   y2="49.44" stroke="#fbbf24"/>
      <line x1="0" y1="0" x2="93.97"    y2="129.44" stroke="#f0abfc"/>
      <line x1="0" y1="0" x2="0"        y2="160" stroke="#f0abfc"/>
      <line x1="0" y1="0" x2="-93.97"   y2="129.44" stroke="#f0abfc"/>
      <line x1="0" y1="0" x2="-152.17"  y2="49.44" stroke="#fb923c"/>
      <line x1="0" y1="0" x2="-152.17"  y2="-49.44" stroke="#fb923c"/>
      <line x1="0" y1="0" x2="-93.97"   y2="-129.44" stroke="#fb923c"/>
    </g>

    <!-- A representative polygon (Bitter Mentor's shape) to show what a soul looks like -->
    <polygon
      points="0,-64 75.18,-103.55 135.26,-43.95 91.30,29.66 16.04,21.02 0,16 -75.18,103.55 -76.08,24.72 -101.45,-32.96 -56.38,-77.66"
      fill="#5eead4"
      fill-opacity="0.15"
      stroke="#ffffff"
      stroke-width="1.5"
      opacity="0.85"/>
  </g>

  <!-- URL footer -->
  <text
    x="80" y="580"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="22" font-weight="400"
    fill="#6b7280">sdmonkey.github.io/soulinthemachine</text>
</svg>
